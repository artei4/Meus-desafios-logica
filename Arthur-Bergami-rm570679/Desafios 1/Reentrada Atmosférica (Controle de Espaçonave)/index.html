<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NASA Control - Reentrada Atmosférica</title>
    <style>
        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #161b22;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #30363d;
        }

        h1 { color: #58a6ff; font-size: 1.4rem; margin-bottom: 20px; }

        label { display: block; margin-top: 15px; font-size: 0.85rem; color: #8b949e; text-align: left; }

        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
        }

        button:hover { background-color: #2ea043; }

        #resultado-logica {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 1px solid transparent;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 NASA Re-entry System</h1>
        
        <label>Ângulo de Entrada (Graus)</label>
        <input type="number" id="anguloInput" placeholder="Ex: 20">

        <label>Integridade do Escudo (%)</label>
        <input type="number" id="escudoInput" placeholder="Ex: 85">

        <button id="btnCalcular">Iniciar Reentrada</button>

        <div id="resultado-logica">Aguardando telemetria...</div>
    </div>

    <script>
        const btn = document.getElementById('btnCalcular');
        // Chamar variável display seguindo o padrão
        const display = document.getElementById('resultado-logica');

        btn.addEventListener('click', () => {
            const angulo = parseFloat(document.getElementById('anguloInput').value);
            // Chamar variável escudo seguindo o padrão de angulo
            const escudo = parseFloat(document.getElementById('escudoInput').value);
            
            let mensagem = "";
            let cor = "";

            // --- LÓGICA DE REENTRADA ---

            // Validação inicial
            if (isNaN(angulo) || isNaN(escudo)) {
                mensagem = "❌ Insira os dados da telemetria!";
                cor = "#f85149"; // Vermelho
            } 
            // 1. Verificação Crítica: Ângulo muito agudo (Risco de queimar)
            else if (angulo > 30) {
                mensagem = "🔥 PERIGO: Ângulo muito alto! Incineração iminente.";
                cor = "#f85149";
            }
            // 2. Verificação Crítica: Ângulo muito raso (Risco de ricochetear para o espaço)
            else if (angulo < 10) {
                mensagem = "🌌 ERRO: Ângulo muito baixo! A nave irá ricochetear.";
                cor = "#d29922"; // Amarelo
            }
            // 3. Verificação de Segurança: Integridade do escudo
            else if (escudo < 50) {
                mensagem = "⚠️ ALERTA: Escudo insuficiente para o calor térmico!";
                cor = "#d29922";
            }
            // 4. Sucesso: Parâmetros ideais
            else {
                mensagem = "✅ REENTRADA SEGURA: Bem-vindo de volta à Terra!";
                cor = "#3fb950"; // Verde
            }

            display.innerText = mensagem;
            display.style.color = cor;
            // Chamar borderColor seguindo o padrão pedido
            display.style.borderColor = cor;
        });
    </script>
    
</body>
</html>
